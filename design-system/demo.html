<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KodNest Premium Build System — Demo</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="kn-page">
    <header class="kn-topbar">
      <span class="kn-topbar__project">Project name</span>
      <span class="kn-topbar__progress">Step 2 / 5</span>
      <span class="kn-topbar__status kn-topbar__status--in-progress">In Progress</span>
    </header>

    <section class="kn-context-header">
      <h1>Context headline</h1>
      <p class="kn-context-header__sub">One-line subtext with clear purpose. No hype.</p>
    </section>

    <main class="kn-main">
      <div class="kn-workspace">
        <div class="kn-card">
          <h3 class="kn-card__title">Primary workspace</h3>
          <p class="kn-card__body">Main product interaction lives here. Clean cards, predictable components.</p>
          <input type="text" class="kn-input" placeholder="Clean input" style="margin-top: 16px;" />
        </div>
      </div>
      <aside class="kn-panel">
        <p class="kn-panel__explanation">Short step explanation. Calm and clear.</p>
        <textarea class="kn-panel__prompt-box" placeholder="Copyable prompt…" readonly></textarea>
        <div class="kn-panel__actions">
          <button type="button" class="kn-btn kn-btn--primary kn-btn--small">Copy</button>
          <button type="button" class="kn-btn kn-btn--secondary kn-btn--small">Build in Lovable</button>
          <button type="button" class="kn-btn kn-btn--ghost kn-btn--small">It Worked</button>
          <button type="button" class="kn-btn kn-btn--ghost kn-btn--small">Error</button>
          <button type="button" class="kn-btn kn-btn--ghost kn-btn--small">Add Screenshot</button>
        </div>
      </aside>
    </main>

    <footer class="kn-proof-footer">
      <label class="kn-proof-footer__item"><input type="checkbox" /> UI Built</label>
      <label class="kn-proof-footer__item"><input type="checkbox" /> Logic Working</label>
      <label class="kn-proof-footer__item"><input type="checkbox" /> Test Passed</label>
      <label class="kn-proof-footer__item"><input type="checkbox" /> Deployed</label>
    </footer>
  </div>
</body>
</html>
